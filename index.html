<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 抽獎系統</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Russo+One&display=swap" rel="stylesheet">

    <!-- CDN Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* ========== CSS Reset ========== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========== CSS Variables ========== */
        :root {
            --bg-color: #0F0F23;
            --bg-secondary: #1a1a3e;
            --text-color: #E2E8F0;
            --text-muted: #94A3B8;
            --accent-color: #7C3AED;
            --accent-light: #A78BFA;
            --cta-color: #F43F5E;
            --cta-hover: #E11D48;
            --neon-color: #00FFFF;
            --particle-color: #00FFFF;
            --card-bg: #161630;
            --card-bg-hover: #1e1e45;
            --border-color: #2D2D5E;
            --success-color: #10B981;
            --warning-color: #F59E0B;

            --font-heading: 'Russo One', sans-serif;
            --font-body: 'Chakra Petch', sans-serif;

            --glow-accent: 0 0 20px rgba(124, 58, 237, 0.4);
            --glow-cta: 0 0 20px rgba(244, 63, 94, 0.5);
            --glow-neon: 0 0 20px rgba(0, 255, 255, 0.5);

            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-full: 9999px;

            --transition: 200ms ease;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            overflow: hidden;
            height: 100vh;
        }

        /* ========== Toolbar ========== */
        .toolbar {
            background-color: var(--bg-color);
            border-bottom: 1px solid var(--accent-color);
            padding: 0 20px;
            height: 56px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 50;
        }

        .toolbar::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-color), var(--neon-color), var(--accent-color), transparent);
            opacity: 0.6;
        }

        .toolbar h1 {
            font-family: var(--font-heading);
            font-size: 20px;
            color: var(--neon-color);
            text-shadow: var(--glow-neon);
            letter-spacing: 2px;
        }

        .toolbar-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .toolbar-btn {
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background-color: transparent;
            color: var(--text-color);
            cursor: pointer;
            transition: all var(--transition);
            font-family: var(--font-body);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toolbar-btn:hover {
            border-color: var(--accent-color);
            background-color: rgba(124, 58, 237, 0.1);
            box-shadow: var(--glow-accent);
        }

        .toolbar-btn svg {
            width: 16px;
            height: 16px;
        }

        .theme-select {
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background-color: var(--card-bg);
            color: var(--text-color);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 13px;
            transition: all var(--transition);
        }

        .theme-select:hover {
            border-color: var(--accent-color);
        }

        .theme-select option {
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* ========== Main Layout ========== */
        .main-container {
            display: flex;
            height: calc(100vh - 56px);
        }

        /* ========== 3D Canvas ========== */
        .canvas-container {
            flex: 1;
            position: relative;
            background: radial-gradient(ellipse at center, var(--bg-secondary) 0%, var(--bg-color) 70%);
            overflow: hidden;
        }

        #canvas3d {
            width: 100%;
            height: 100%;
            display: block;
        }

        .fallback-2d {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 24px;
            border-radius: var(--radius-lg);
            display: none;
            max-width: 400px;
            text-align: center;
        }

        /* ========== Confetti Canvas ========== */
        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* ========== Winner Overlay ========== */
        .winner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(15, 15, 35, 0.95) 0%, rgba(15, 15, 35, 0.98) 100%);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        .winner-overlay.active {
            display: flex;
        }

        .winner-content {
            text-align: center;
            animation: winnerPulse 2s ease infinite;
        }

        .winner-content h2 {
            font-family: var(--font-heading);
            font-size: 28px;
            color: var(--accent-light);
            margin-bottom: 16px;
            letter-spacing: 4px;
        }

        .winner-name {
            font-family: var(--font-heading);
            font-size: 48px;
            color: var(--neon-color);
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.6), 0 0 40px rgba(0, 255, 255, 0.3), 0 0 60px rgba(0, 255, 255, 0.1);
            animation: winnerGlow 2s ease infinite;
        }

        .winner-prize {
            font-family: var(--font-body);
            font-size: 22px;
            color: var(--accent-light);
            margin-top: 12px;
        }

        .close-winner-btn {
            margin-top: 32px;
            padding: 12px 32px;
            background: transparent;
            border: 1px solid var(--neon-color);
            color: var(--neon-color);
            border-radius: var(--radius-full);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 15px;
            font-weight: 500;
            transition: all var(--transition);
        }

        .close-winner-btn:hover {
            background-color: rgba(0, 255, 255, 0.1);
            box-shadow: var(--glow-neon);
        }

        @keyframes winnerGlow {
            0%, 100% { text-shadow: 0 0 20px rgba(0,255,255,0.6), 0 0 40px rgba(0,255,255,0.3); }
            50% { text-shadow: 0 0 30px rgba(0,255,255,0.8), 0 0 60px rgba(0,255,255,0.5), 0 0 80px rgba(0,255,255,0.2); }
        }

        @keyframes winnerPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        /* ========== Control Panel ========== */
        .control-panel {
            width: 380px;
            background-color: var(--card-bg);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Prize Display */
        .prize-display {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
        }

        .prize-display-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .prize-display-value {
            font-family: var(--font-heading);
            font-size: 20px;
            color: var(--accent-light);
        }

        .prize-display-count {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Draw Button */
        .draw-section {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .draw-button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--cta-color), #9333EA);
            color: white;
            font-family: var(--font-heading);
            font-size: 18px;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--glow-cta);
            position: relative;
            overflow: hidden;
        }

        .draw-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(244, 63, 94, 0.6), 0 0 60px rgba(244, 63, 94, 0.2);
        }

        .draw-button:active:not(:disabled) {
            transform: translateY(0);
        }

        .draw-button:disabled {
            background: var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
        }

        /* ========== Tabs ========== */
        .tabs-container {
            display: flex;
            border-bottom: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            padding: 12px 8px;
            background: none;
            border: none;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            transition: all var(--transition);
            position: relative;
        }

        .tab-btn:hover {
            color: var(--text-color);
            background-color: rgba(124, 58, 237, 0.05);
        }

        .tab-btn.active {
            color: var(--accent-light);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-color), var(--accent-light));
        }

        /* ========== Tab Content ========== */
        .tab-content {
            display: none;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
        }

        .tab-content.active {
            display: flex;
        }

        .list-actions {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            flex-wrap: wrap;
        }

        .list-actions button {
            padding: 6px 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background-color: transparent;
            color: var(--text-color);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 12px;
            font-weight: 500;
            transition: all var(--transition);
        }

        .list-actions button:hover {
            border-color: var(--accent-color);
            background-color: rgba(124, 58, 237, 0.1);
        }

        .item-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 16px;
        }

        .list-item {
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all var(--transition);
            cursor: grab;
        }

        .list-item:hover {
            border-color: var(--accent-color);
            background-color: var(--card-bg-hover);
        }

        .list-item-name {
            font-size: 14px;
            color: var(--text-color);
        }

        .list-item-actions {
            display: flex;
            gap: 4px;
        }

        .icon-btn {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all var(--transition);
        }

        .icon-btn:hover {
            background-color: rgba(124, 58, 237, 0.15);
            color: var(--accent-light);
        }

        .icon-btn.delete:hover {
            background-color: rgba(244, 63, 94, 0.15);
            color: var(--cta-color);
        }

        .icon-btn svg {
            width: 14px;
            height: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state p {
            font-size: 14px;
            margin-bottom: 6px;
        }

        .empty-state small {
            font-size: 12px;
            opacity: 0.6;
        }

        /* History item */
        .history-item {
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            margin-bottom: 6px;
        }

        .history-winner {
            font-weight: 600;
            color: var(--neon-color);
            font-size: 14px;
        }

        .history-prize {
            font-size: 12px;
            color: var(--accent-light);
            margin-top: 2px;
        }

        .history-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ========== Modals ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 28px;
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 460px;
            animation: modalSlideIn 200ms ease;
        }

        @keyframes modalSlideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            font-family: var(--font-heading);
            font-size: 18px;
            color: var(--accent-light);
        }

        .close-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            cursor: pointer;
            transition: all var(--transition);
        }

        .close-btn:hover {
            border-color: var(--cta-color);
            color: var(--cta-color);
            background-color: rgba(244, 63, 94, 0.1);
        }

        .close-btn svg {
            width: 14px;
            height: 14px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-body);
            font-size: 14px;
            transition: border-color var(--transition);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-group input[type="color"] {
            padding: 4px;
            height: 40px;
            cursor: pointer;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 500;
            transition: all var(--transition);
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
        }

        .btn-ghost:hover {
            border-color: var(--text-muted);
            background-color: rgba(255, 255, 255, 0.05);
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--accent-light);
        }

        .btn-danger {
            background-color: transparent;
            border: 1px solid var(--cta-color);
            color: var(--cta-color);
        }

        .btn-danger:hover {
            background-color: rgba(244, 63, 94, 0.1);
        }

        /* ========== Scrollbar ========== */
        .item-list::-webkit-scrollbar {
            width: 4px;
        }

        .item-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .item-list::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 2px;
        }

        .item-list::-webkit-scrollbar-thumb:hover {
            background: var(--accent-color);
        }

        /* ========== Responsive ========== */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }

            .canvas-container {
                height: 45vh;
            }

            .control-panel {
                width: 100%;
                flex: 1;
            }
        }

        /* ========== Fullscreen ========== */
        body.fullscreen-mode .toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 60;
        }

        body.fullscreen-mode .main-container {
            padding-top: 56px;
        }

        /* ========== Reduced Motion ========== */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- ===== Toolbar ===== -->
    <div class="toolbar">
        <h1>3D 抽獎系統</h1>
        <div class="toolbar-controls">
            <select class="theme-select" id="theme-select">
                <option value="cyber">科技感</option>
                <option value="festive">節慶派對</option>
                <option value="minimal">簡約現代</option>
                <option value="custom">自訂</option>
            </select>
            <button class="toolbar-btn" id="fullscreen-btn" title="全螢幕 (F)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
            </button>
            <button class="toolbar-btn" id="sound-toggle" title="音效開關">
                <svg id="sound-icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                <svg id="sound-icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
            </button>
        </div>
    </div>

    <!-- ===== Main Container ===== -->
    <div class="main-container">
        <!-- 3D Canvas -->
        <div class="canvas-container">
            <canvas id="canvas3d"></canvas>
            <div class="fallback-2d" id="fallback-2d">
                <p style="font-size:16px; margin-bottom:8px;">WebGL 不支援</p>
                <p style="font-size:13px; color:var(--text-muted);">使用簡易模式</p>
                <div id="fallback-names" style="margin-top:16px; max-height:200px; overflow-y:auto;"></div>
            </div>
            <canvas id="confetti-canvas"></canvas>

            <!-- Winner Overlay -->
            <div class="winner-overlay" id="winner-overlay">
                <div class="winner-content">
                    <h2>WINNER</h2>
                    <div class="winner-name" id="winner-name"></div>
                    <div class="winner-prize" id="winner-prize"></div>
                    <button class="close-winner-btn" id="close-winner-btn">關閉</button>
                </div>
            </div>
        </div>

        <!-- Control Panel -->
        <div class="control-panel">
            <!-- Prize Display -->
            <div class="prize-display">
                <div class="prize-display-label">當前獎品</div>
                <div class="prize-display-value" id="current-prize-name">尚未設定</div>
                <div class="prize-display-count" id="current-prize-count"></div>
            </div>

            <!-- Draw Button -->
            <div class="draw-section">
                <button class="draw-button" id="draw-btn" disabled>開始抽獎</button>
            </div>

            <!-- Tabs -->
            <div class="tabs-container">
                <button class="tab-btn active" data-tab="names">名單管理</button>
                <button class="tab-btn" data-tab="prizes">獎項管理</button>
                <button class="tab-btn" data-tab="history">歷史記錄</button>
            </div>

            <!-- Tab: Names -->
            <div class="tab-content active" id="names-tab">
                <div class="list-actions">
                    <button id="add-name-btn">新增</button>
                    <button id="batch-import-btn">批次匯入</button>
                    <button id="google-import-btn">Google 匯入</button>
                </div>
                <div class="item-list" id="names-list">
                    <div class="empty-state">
                        <p>暫無名單</p>
                        <small>點擊上方按鈕新增</small>
                    </div>
                </div>
            </div>

            <!-- Tab: Prizes -->
            <div class="tab-content" id="prizes-tab">
                <div class="list-actions">
                    <button id="add-prize-btn">新增獎品</button>
                    <button id="batch-import-prizes-btn">批次匯入</button>
                </div>
                <div class="item-list" id="prizes-list">
                    <div class="empty-state">
                        <p>暫無獎品</p>
                        <small>點擊上方按鈕新增</small>
                    </div>
                </div>
            </div>

            <!-- Tab: History -->
            <div class="tab-content" id="history-tab">

    <!-- ===== JavaScript ===== -->
    <script>
    (function() {
        'use strict';

        // ========== SVG Icons ==========
        const icons = {
            edit: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
            trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>'
        };

        // ========== State ==========
        const state = {
            names: [],
            prizes: [],
            history: [],
            currentPrizeIndex: 0,
            isDrawing: false,
            soundEnabled: true,
            theme: 'cyber',
            customTheme: {
                bgColor: '#0F0F23',
                textColor: '#E2E8F0',
                accentColor: '#7C3AED',
                particleColor: '#00FFFF'
            },
            googleApiKey: '',
            webglSupported: true
        };

        // ========== Storage ==========
        const KEYS = {
            NAMES: 'lottery_names',
            PRIZES: 'lottery_prizes',
            HISTORY: 'lottery_history',
            THEME: 'lottery_theme',
            CUSTOM_THEME: 'lottery_custom_theme',
            SOUND: 'lottery_sound',
            GOOGLE_API_KEY: 'lottery_google_api_key'
        };

        function storageAvailable() {
            try {
                const t = '__t__';
                localStorage.setItem(t, t);
                localStorage.removeItem(t);
                return true;
            } catch (e) { return false; }
        }

        function save(key, data) {
            if (!storageAvailable()) return;
            try { localStorage.setItem(key, JSON.stringify(data)); }
            catch (e) { alert('無法儲存資料，請檢查瀏覽器設定'); }
        }

        function load(key, fallback) {
            if (!storageAvailable()) return fallback;
            try {
                const d = localStorage.getItem(key);
                return d ? JSON.parse(d) : fallback;
            } catch (e) { return fallback; }
        }

        function loadState() {
            state.names = load(KEYS.NAMES, []);
            state.prizes = load(KEYS.PRIZES, []);
            state.history = load(KEYS.HISTORY, []);
            state.theme = load(KEYS.THEME, 'cyber');
            state.customTheme = load(KEYS.CUSTOM_THEME, state.customTheme);
            state.soundEnabled = load(KEYS.SOUND, true);
            state.googleApiKey = load(KEYS.GOOGLE_API_KEY, '');
        }

        // ========== Audio ==========
        const Audio = {
            ctx: null,
            init() {
                try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
                catch (e) {}
            },
            playTick() {
                if (!state.soundEnabled || !this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.frequency.value = 800 + Math.random() * 400;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.05);
                osc.start(this.ctx.currentTime);
                osc.stop(this.ctx.currentTime + 0.05);
            },
            playWin() {
                if (!state.soundEnabled || !this.ctx) return;
                [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                    setTimeout(() => {
                        const osc = this.ctx.createOscillator();
                        const gain = this.ctx.createGain();
                        osc.connect(gain);
                        gain.connect(this.ctx.destination);
                        osc.frequency.value = freq;
                        osc.type = 'sine';
                        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                        osc.start(this.ctx.currentTime);
                        osc.stop(this.ctx.currentTime + 0.3);
                    }, i * 100);
                });
            }
        };

        // ========== Utility ==========
        function uuid() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                const r = Math.random() * 16 | 0;
                return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
            });
        }

        function formatTime(ts) {
            return new Date(ts).toLocaleString('zh-TW');
        }

        function randomItems(arr, count) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a.slice(0, count);
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ========== DOM Helpers ==========
        const $ = (sel) => document.getElementById(sel);
        const $$ = (sel) => document.querySelectorAll(sel);

        // ========== Modal ==========
        function showModal(id) {
            const m = $(id);
            if (m) m.classList.add('active');
        }

        function hideModal(id) {
            const m = $(id);
            if (m) m.classList.remove('active');
        }

        function initModals() {
            $$('.close-btn[data-modal]').forEach(btn => {
                btn.addEventListener('click', () => hideModal(btn.dataset.modal));
            });
            $$('.btn-ghost[data-modal]').forEach(btn => {
                btn.addEventListener('click', () => hideModal(btn.dataset.modal));
            });
            $$('.modal').forEach(modal => {
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) modal.classList.remove('active');
                });
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    $$('.modal.active').forEach(m => m.classList.remove('active'));
                }
            });
        }

        // ========== Tabs ==========
        function initTabs() {
            $$('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    $$('.tab-btn').forEach(b => b.classList.remove('active'));
                    $$('.tab-content').forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                    const tab = $(btn.dataset.tab + '-tab');
                    if (tab) tab.classList.add('active');
                });
            });
        }

        // ========== Names ==========
        function saveNames() {
            save(KEYS.NAMES, state.names);
            renderNames();
            update3DScene();
            updateDrawButton();
        }

        function renderNames() {
            const el = $('names-list');
            if (!el) return;
            if (state.names.length === 0) {
                el.innerHTML = '<div class="empty-state"><p>暫無名單</p><small>點擊上方按鈕新增</small></div>';
                return;
            }
            el.innerHTML = state.names.map((name, i) =>
                `<div class="list-item" draggable="true" data-index="${i}" data-type="name">
                    <span class="list-item-name">${escapeHtml(name)}</span>
                    <div class="list-item-actions">
                        <button class="icon-btn edit-name-btn" data-index="${i}" title="編輯">${icons.edit}</button>
                        <button class="icon-btn delete delete-name-btn" data-index="${i}" title="刪除">${icons.trash}</button>
                    </div>
                </div>`
            ).join('');
            bindListEvents(el, 'name');
        }

        function addName() {
            const input = $('name-input');
            const name = input.value.trim();
            if (!name) return;
            state.names.push(name);
            saveNames();
            hideModal('name-modal');
            input.value = '';
        }

        function editName(index) {
            const cur = state.names[index];
            const val = prompt('請輸入新名稱：', cur);
            if (val !== null && val.trim()) {
                state.names[index] = val.trim();
                saveNames();
            }
        }

        function deleteName(index) {
            if (confirm(`確定要刪除「${state.names[index]}」嗎？`)) {
                state.names.splice(index, 1);
                saveNames();
            }
        }

        // ========== Prizes ==========
        function savePrizes() {
            save(KEYS.PRIZES, state.prizes);
            renderPrizes();
            updatePrizeDisplay();
            updateDrawButton();
        }

        function renderPrizes() {
            const el = $('prizes-list');
            if (!el) return;
            if (state.prizes.length === 0) {
                el.innerHTML = '<div class="empty-state"><p>暫無獎品</p><small>點擊上方按鈕新增</small></div>';
                return;
            }
            el.innerHTML = state.prizes.map((p, i) =>
                `<div class="list-item" draggable="true" data-index="${i}" data-type="prize">
                    <span class="list-item-name">${escapeHtml(p.name)} <span style="color:var(--text-muted);font-size:12px">x${p.count}</span></span>
                    <div class="list-item-actions">
                        <button class="icon-btn edit-prize-btn" data-index="${i}" title="編輯">${icons.edit}</button>
                        <button class="icon-btn delete delete-prize-btn" data-index="${i}" title="刪除">${icons.trash}</button>
                    </div>
                </div>`
            ).join('');
            bindListEvents(el, 'prize');
        }

        function addPrize() {
            const nameInput = $('prize-name-input');
            const countInput = $('prize-count-input');
            const name = nameInput.value.trim();
            const count = parseInt(countInput.value) || 1;
            if (!name) return;
            state.prizes.push({ id: uuid(), name, count });
            savePrizes();
            hideModal('prize-modal');
            nameInput.value = '';
            countInput.value = '1';
        }

        function editPrize(index) {
            const p = state.prizes[index];
            const newName = prompt('請輸入新獎品名稱：', p.name);
            if (newName !== null && newName.trim()) {
                const newCount = prompt('請輸入數量：', p.count);
                state.prizes[index].name = newName.trim();
                state.prizes[index].count = parseInt(newCount) || p.count;
                savePrizes();
            }
        }

        function deletePrize(index) {
            if (confirm(`確定要刪除「${state.prizes[index].name}」嗎？`)) {
                state.prizes.splice(index, 1);
                // Adjust currentPrizeIndex if needed
                if (state.currentPrizeIndex >= state.prizes.length) {
                    state.currentPrizeIndex = 0;
                }
                savePrizes();
            }
        }

        function getCurrentPrize() {
            // Find the first prize with count > 0
            for (let i = 0; i < state.prizes.length; i++) {
                if (state.prizes[i].count > 0) return { prize: state.prizes[i], index: i };
            }
            return null;
        }

        function updatePrizeDisplay() {
            const nameEl = $('current-prize-name');
            const countEl = $('current-prize-count');
            if (!nameEl || !countEl) return;

            const current = getCurrentPrize();
            if (!current) {
                nameEl.textContent = '尚未設定';
                countEl.textContent = '';
                return;
            }
            nameEl.textContent = current.prize.name;
            countEl.textContent = `剩餘數量: ${current.prize.count}`;
        }

        // ========== History ==========
        function saveHistory() {
            save(KEYS.HISTORY, state.history);
            renderHistory();
        }

        function renderHistory() {
            const el = $('history-list');
            if (!el) return;
            if (state.history.length === 0) {
                el.innerHTML = '<div class="empty-state"><p>暫無紀錄</p><small>完成抽獎後顯示</small></div>';
                return;
            }
            el.innerHTML = state.history.map(r =>
                `<div class="history-item">
                    <div class="history-winner">${escapeHtml(r.winner)}</div>
                    <div class="history-prize">${r.prize ? escapeHtml(r.prize) : '無獎項'}</div>
                    <div class="history-time">${formatTime(r.timestamp)}</div>
                </div>`
            ).join('');
        }

        // ========== Drag & Drop ==========
        function bindListEvents(listEl, type) {
            let dragIdx = null;

            listEl.querySelectorAll('.list-item').forEach(item => {
                item.addEventListener('dragstart', () => {
                    dragIdx = parseInt(item.dataset.index);
                    item.style.opacity = '0.4';
                });
                item.addEventListener('dragend', () => {
                    item.style.opacity = '1';
                    dragIdx = null;
                });
                item.addEventListener('dragover', e => e.preventDefault());
                item.addEventListener('drop', e => {
                    e.preventDefault();
                    const targetIdx = parseInt(item.dataset.index);
                    if (dragIdx !== null && dragIdx !== targetIdx) {
                        const arr = type === 'name' ? state.names : state.prizes;
                        const [moved] = arr.splice(dragIdx, 1);
                        arr.splice(targetIdx, 0, moved);
                        if (type === 'name') saveNames();
                        else savePrizes();
                    }
                });
            });

            // Edit / Delete
            if (type === 'name') {
                listEl.querySelectorAll('.edit-name-btn').forEach(btn => {
                    btn.addEventListener('click', e => { e.stopPropagation(); editName(parseInt(btn.dataset.index)); });
                });
                listEl.querySelectorAll('.delete-name-btn').forEach(btn => {
                    btn.addEventListener('click', e => { e.stopPropagation(); deleteName(parseInt(btn.dataset.index)); });
                });
            } else {
                listEl.querySelectorAll('.edit-prize-btn').forEach(btn => {
                    btn.addEventListener('click', e => { e.stopPropagation(); editPrize(parseInt(btn.dataset.index)); });
                });
                listEl.querySelectorAll('.delete-prize-btn').forEach(btn => {
                    btn.addEventListener('click', e => { e.stopPropagation(); deletePrize(parseInt(btn.dataset.index)); });
                });
            }
        }

        // ========== Batch Import ==========
        let batchType = 'names';

        function openBatchImport(type) {
            batchType = type;
            const title = $('batch-import-title');
            const label = $('batch-import-label');
            const textarea = $('batch-textarea');
            if (type === 'prizes') {
                title.textContent = '批次匯入獎品';
                label.textContent = '格式：名稱,數量（一行一個）';
                textarea.placeholder = '頭獎,1\n二獎,2\n三獎,3';
            } else {
                title.textContent = '批次匯入名單';
                label.textContent = '一行一個名稱';
                textarea.placeholder = '張三\n李四\n王五';
            }
            textarea.value = '';
            showModal('batch-import-modal');
        }

        function submitBatch() {
            const text = $('batch-textarea').value.trim();
            if (!text) return;
            const lines = text.split('\n').filter(l => l.trim());

            if (batchType === 'prizes') {
                lines.forEach(line => {
                    const parts = line.split(',');
                    const name = (parts[0] || '').trim();
                    const count = parseInt(parts[1]) || 1;
                    if (name) state.prizes.push({ id: uuid(), name, count });
                });
                savePrizes();
            } else {
                lines.forEach(line => {
                    const name = line.trim();
                    if (name) state.names.push(name);
                });
                saveNames();
            }
            hideModal('batch-import-modal');
        }

        // ========== Google Sheets ==========
        async function importGoogle() {
            const apiKey = $('google-api-key').value.trim();
            const sheetId = $('google-sheet-id').value.trim();
            const range = $('google-range').value.trim() || 'Sheet1!A2:A';

            if (!apiKey || !sheetId) {
                alert('請輸入 API Key 和試算表 ID');
                return;
            }

            state.googleApiKey = apiKey;
            save(KEYS.GOOGLE_API_KEY, apiKey);

            const url = `https://sheets.googleapis.com/v4/spreadsheets/${encodeURIComponent(sheetId)}/values/${encodeURIComponent(range)}?key=${encodeURIComponent(apiKey)}`;

            try {
                const res = await fetch(url);
                if (!res.ok) {
                    if (res.status === 400 || res.status === 403) throw new Error('API Key 無效，請檢查設定');
                    if (res.status === 404) throw new Error('無法讀取試算表，請確認已發布為網頁');
                    throw new Error('匯入失敗，請稍後再試');
                }
                const data = await res.json();
                if (!data.values || data.values.length === 0) throw new Error('試算表沒有資料');

                const items = data.values.flat().filter(s => s && s.trim());
                state.names.push(...items);
                saveNames();
                hideModal('google-modal');
                alert(`成功匯入 ${items.length} 筆資料`);
            } catch (err) {
                alert(err.message);
            }
        }

        // ========== Theme ==========
        const themes = {
            cyber: { bgColor: '#0F0F23', bgSecondary: '#1a1a3e', textColor: '#E2E8F0', accentColor: '#7C3AED', accentLight: '#A78BFA', neonColor: '#00FFFF', particleColor: '#00FFFF', cardBg: '#161630', borderColor: '#2D2D5E' },
            festive: { bgColor: '#1a0a1a', bgSecondary: '#2a1535', textColor: '#FFF5E6', accentColor: '#FFD700', accentLight: '#FFED4A', neonColor: '#FF69B4', particleColor: '#FF69B4', cardBg: '#251530', borderColor: '#4A2D5E' },
            minimal: { bgColor: '#1a1a2e', bgSecondary: '#222240', textColor: '#E0E0E0', accentColor: '#3B82F6', accentLight: '#60A5FA', neonColor: '#60A5FA', particleColor: '#3B82F6', cardBg: '#1f1f38', borderColor: '#333360' }
        };

        function applyTheme(name) {
            let t;
            if (name === 'custom') {
                t = {
                    bgColor: state.customTheme.bgColor,
                    bgSecondary: state.customTheme.bgColor,
                    textColor: state.customTheme.textColor,
                    accentColor: state.customTheme.accentColor,
                    accentLight: state.customTheme.accentColor,
                    neonColor: state.customTheme.particleColor,
                    particleColor: state.customTheme.particleColor,
                    cardBg: state.customTheme.bgColor,
                    borderColor: state.customTheme.accentColor + '40'
                };
                showModal('theme-modal');
            } else {
                t = themes[name];
            }
            if (!t) return;

            const root = document.documentElement.style;
            root.setProperty('--bg-color', t.bgColor);
            root.setProperty('--bg-secondary', t.bgSecondary);
            root.setProperty('--text-color', t.textColor);
            root.setProperty('--accent-color', t.accentColor);
            root.setProperty('--accent-light', t.accentLight);
            root.setProperty('--neon-color', t.neonColor);
            root.setProperty('--particle-color', t.particleColor);
            root.setProperty('--card-bg', t.cardBg);
            root.setProperty('--border-color', t.borderColor);

            state.theme = name;
            save(KEYS.THEME, name);
            save(KEYS.CUSTOM_THEME, state.customTheme);

            // Update 3D background
            if (renderer) {
                const container = document.querySelector('.canvas-container');
                container.style.background = `radial-gradient(ellipse at center, ${t.bgSecondary} 0%, ${t.bgColor} 70%)`;
            }
        }

        // ========== Fullscreen ==========
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
                document.body.classList.add('fullscreen-mode');
            } else {
                document.exitFullscreen();
                document.body.classList.remove('fullscreen-mode');
            }
        }

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) document.body.classList.remove('fullscreen-mode');
        });

        // ========== Draw Button State ==========
        function updateDrawButton() {
            const btn = $('draw-btn');
            if (!btn) return;
            const hasPrize = getCurrentPrize() !== null;
            btn.disabled = state.names.length === 0 || !hasPrize || state.isDrawing;
        }

        // ========== 3D Scene ==========
        let scene, camera, renderer, sphereGroup, nameSprites = [];
        let animationId = null;
        let rotationSpeed = 0.005;
        let targetSpeed = 0.005;

        function checkWebGL() {
            try {
                const c = document.createElement('canvas');
                return !!(window.WebGLRenderingContext && (c.getContext('webgl') || c.getContext('experimental-webgl')));
            } catch (e) { return false; }
        }

        function init3D() {
            if (!checkWebGL()) {
                state.webglSupported = false;
                $('fallback-2d').style.display = 'block';
                update2DFallback();
                return;
            }

            const container = document.querySelector('.canvas-container');
            const canvas = $('canvas3d');

            scene = new THREE.Scene();
            const w = container.clientWidth, h = container.clientHeight;
            camera = new THREE.PerspectiveCamera(75, w / h, 0.1, 1000);
            camera.position.z = 200;

            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setSize(w, h);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            sphereGroup = new THREE.Group();
            scene.add(sphereGroup);

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const pointLight = new THREE.PointLight(0xffffff, 0.8);
            pointLight.position.set(100, 100, 100);
            scene.add(pointLight);

            update3DScene();
            animate();

            window.addEventListener('resize', onResize);
        }

        function update3DScene() {
            if (!state.webglSupported) { update2DFallback(); return; }
            if (!sphereGroup) return;

            nameSprites.forEach(s => {
                sphereGroup.remove(s);
                if (s.material.map) s.material.map.dispose();
                s.material.dispose();
            });
            nameSprites = [];

            let display = [...state.names];
            if (display.length === 0) display = ['等待名單...'];
            else if (display.length > 50) display = randomItems(display, 50);

            const count = display.length;
            display.forEach((name, i) => {
                const phi = Math.acos(-1 + (2 * i) / count);
                const theta = Math.sqrt(count * Math.PI) * phi;
                const r = 100;

                const sprite = createSprite(name);
                sprite.position.set(
                    r * Math.cos(theta) * Math.sin(phi),
                    r * Math.sin(theta) * Math.sin(phi),
                    r * Math.cos(phi)
                );
                sphereGroup.add(sprite);
                nameSprites.push(sprite);
            });
        }

        function createSprite(text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 64;
            ctx.clearRect(0, 0, 256, 64);

            ctx.font = 'bold 24px "Chakra Petch", Arial, sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0, 255, 255, 0.5)';
            ctx.shadowBlur = 6;
            ctx.fillText(text, 128, 32);

            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            const mat = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(mat);
            sprite.scale.set(40, 10, 1);
            return sprite;
        }

        function animate() {
            animationId = requestAnimationFrame(animate);
            rotationSpeed += (targetSpeed - rotationSpeed) * 0.05;
            if (sphereGroup) {
                sphereGroup.rotation.y += rotationSpeed;
                sphereGroup.rotation.x += rotationSpeed * 0.3;
            }
            if (renderer && scene && camera) renderer.render(scene, camera);
        }

        function onResize() {
            if (!camera || !renderer) return;
            const c = document.querySelector('.canvas-container');
            const w = c.clientWidth, h = c.clientHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        }

        function update2DFallback() {
            const el = $('fallback-names');
            if (!el) return;
            let display = [...state.names];
            if (display.length === 0) display = ['等待名單...'];
            else if (display.length > 20) display = randomItems(display, 20);
            el.innerHTML = display.map(n =>
                `<div style="padding:6px 10px;margin:4px 0;background:rgba(124,58,237,0.2);border-radius:4px;font-size:13px;">${escapeHtml(n)}</div>`
            ).join('');
        }

        // ========== Draw Logic ==========
        let tickInterval = null;

        function startDraw() {
            if (state.isDrawing) return;
            if (state.names.length === 0) { alert('請先新增名單！'); return; }

            const current = getCurrentPrize();
            if (!current) { alert('沒有可用獎品！'); return; }

            state.isDrawing = true;
            updateDrawButton();

            // Resume audio context (browser policy)
            if (Audio.ctx && Audio.ctx.state === 'suspended') Audio.ctx.resume();

            // Speed up
            targetSpeed = 0.15;
            tickInterval = setInterval(() => Audio.playTick(), 100);

            // Slow down after 3s
            setTimeout(() => {
                targetSpeed = 0.005;
                // Reveal after 2s
                setTimeout(() => revealWinner(), 2000);
            }, 3000);
        }

        function revealWinner() {
            if (tickInterval) { clearInterval(tickInterval); tickInterval = null; }

            // Pick random winner
            const winnerIdx = Math.floor(Math.random() * state.names.length);
            const winner = state.names[winnerIdx];

            // Get current prize and decrement count
            const current = getCurrentPrize();
            const prizeName = current ? current.prize.name : null;
            if (current) {
                current.prize.count--;
                if (current.prize.count <= 0) {
                    state.prizes.splice(current.index, 1);
                }
            }

            // Remove winner from names
            state.names.splice(winnerIdx, 1);

            // Save
            save(KEYS.NAMES, state.names);
            save(KEYS.PRIZES, state.prizes);
            renderNames();
            renderPrizes();
            update3DScene();

            // History
            state.history.unshift({ id: uuid(), winner, prize: prizeName, timestamp: Date.now() });
            saveHistory();

            // Effects
            Audio.playWin();
            showWinner(winner, prizeName);

            // Reset
            state.isDrawing = false;
            updateDrawButton();
            updatePrizeDisplay();
        }

        // ========== Winner Overlay ==========
        function showWinner(winner, prize) {
            $('winner-name').textContent = winner;
            $('winner-prize').textContent = prize ? `獲得：${prize}` : '';
            $('winner-overlay').classList.add('active');
            startConfetti();
        }

        function hideWinner() {
            $('winner-overlay').classList.remove('active');
            stopConfetti();
        }

        // ========== Confetti ==========
        let confettiId = null;
        let confettiParticles = [];

        function startConfetti() {
            const canvas = $('confetti-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;

            confettiParticles = [];
            const colors = ['#7C3AED', '#A78BFA', '#F43F5E', '#00FFFF', '#FFD700', '#FF69B4'];
            for (let i = 0; i < 150; i++) {
                confettiParticles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    w: Math.random() * 10 + 5,
                    h: Math.random() * 6 + 3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speed: Math.random() * 3 + 2,
                    angle: Math.random() * Math.PI * 2,
                    spin: Math.random() * 0.2 - 0.1
                });
            }

            function loop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                confettiParticles.forEach(p => {
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.angle);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                    ctx.restore();
                    p.y += p.speed;
                    p.x += Math.sin(p.angle) * 0.5;
                    p.angle += p.spin;
                    if (p.y > canvas.height) { p.y = -p.h; p.x = Math.random() * canvas.width; }
                });
                confettiId = requestAnimationFrame(loop);
            }
            loop();
        }

        function stopConfetti() {
            if (confettiId) { cancelAnimationFrame(confettiId); confettiId = null; }
            const canvas = $('confetti-canvas');
            if (canvas) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
            confettiParticles = [];
        }

        // ========== Export ==========
        function exportCSV() {
            if (state.history.length === 0) { alert('沒有歷史記錄'); return; }
            let csv = '\uFEFF抽獎序號,時間,獎項,中獎者\n';
            state.history.forEach((r, i) => {
                csv += `${i + 1},${formatTime(r.timestamp)},${r.prize || ''},${r.winner}\n`;
            });
            downloadFile(csv, 'lottery-result.csv', 'text/csv;charset=utf-8');
        }

        function exportJSON() {
            if (state.history.length === 0) { alert('沒有歷史記錄'); return; }
            downloadFile(JSON.stringify(state.history, null, 2), 'lottery-result.json', 'application/json');
        }

        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function takeScreenshot() {
            const target = $('winner-overlay');
            if (!target || !target.classList.contains('active')) {
                alert('請在中獎畫面時使用截圖功能');
                return;
            }
            html2canvas(target).then(canvas => {
                const a = document.createElement('a');
                a.download = `winner-${Date.now()}.png`;
                a.href = canvas.toDataURL();
                a.click();
            }).catch(() => alert('截圖失敗'));
        }

        // ========== Init ==========
        function init() {
            loadState();
            initModals();
            initTabs();
            Audio.init();

            // Render
            renderNames();
            renderPrizes();
            renderHistory();
            updatePrizeDisplay();
            updateDrawButton();

            // 3D
            init3D();

            // Theme
            const sel = $('theme-select');
            if (sel) {
                sel.value = state.theme;
                if (state.theme !== 'custom') applyTheme(state.theme);
                else {
                    // Apply custom without showing modal
                    const t = state.customTheme;
                    const root = document.documentElement.style;
                    root.setProperty('--bg-color', t.bgColor);
                    root.setProperty('--text-color', t.textColor);
                    root.setProperty('--accent-color', t.accentColor);
                    root.setProperty('--particle-color', t.particleColor);
                }
                sel.addEventListener('change', e => applyTheme(e.target.value));
            }

            // Sound toggle
            const soundBtn = $('sound-toggle');
            if (soundBtn) {
                updateSoundIcon();
                soundBtn.addEventListener('click', () => {
                    state.soundEnabled = !state.soundEnabled;
                    save(KEYS.SOUND, state.soundEnabled);
                    updateSoundIcon();
                });
            }

            // Fullscreen
            $('fullscreen-btn').addEventListener('click', toggleFullscreen);

            // F key (only when not in input)
            document.addEventListener('keydown', e => {
                if (e.key === 'f' || e.key === 'F') {
                    const tag = document.activeElement.tagName;
                    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
                    toggleFullscreen();
                }
            });

            // Draw button
            $('draw-btn').addEventListener('click', startDraw);

            // Close winner
            $('close-winner-btn').addEventListener('click', hideWinner);

            // Name buttons
            $('add-name-btn').addEventListener('click', () => { $('name-input').value = ''; showModal('name-modal'); });
            $('batch-import-btn').addEventListener('click', () => openBatchImport('names'));
            $('google-import-btn').addEventListener('click', () => {
                $('google-api-key').value = state.googleApiKey;
                showModal('google-modal');
            });
            $('submit-name').addEventListener('click', addName);
            $('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') addName(); });

            // Prize buttons
            $('add-prize-btn').addEventListener('click', () => {
                $('prize-name-input').value = '';
                $('prize-count-input').value = '1';
                showModal('prize-modal');
            });
            $('batch-import-prizes-btn').addEventListener('click', () => openBatchImport('prizes'));
            $('submit-prize').addEventListener('click', addPrize);
            $('prize-name-input').addEventListener('keydown', e => { if (e.key === 'Enter') addPrize(); });

            // Batch
            $('submit-batch').addEventListener('click', submitBatch);

            // Google
            $('google-confirm').addEventListener('click', importGoogle);

            // Export
            $('export-csv-btn').addEventListener('click', exportCSV);
            $('export-json-btn').addEventListener('click', exportJSON);
            $('screenshot-btn').addEventListener('click', takeScreenshot);
            $('clear-history-btn').addEventListener('click', () => {
                if (confirm('確定要清空所有歷史記錄嗎？')) {
                    state.history = [];
                    saveHistory();
                }
            });

            // Custom theme
            $('save-theme').addEventListener('click', () => {
                state.customTheme = {
                    bgColor: $('custom-bg').value,
                    textColor: $('custom-text').value,
                    accentColor: $('custom-accent').value,
                    particleColor: $('custom-particle').value
                };
                applyTheme('custom');
                hideModal('theme-modal');
            });

            $('reset-theme').addEventListener('click', () => {
                state.customTheme = { bgColor: '#0F0F23', textColor: '#E2E8F0', accentColor: '#7C3AED', particleColor: '#00FFFF' };
                applyTheme('cyber');
                $('theme-select').value = 'cyber';
                hideModal('theme-modal');
            });
        }

        function updateSoundIcon() {
            $('sound-icon-on').style.display = state.soundEnabled ? 'block' : 'none';
            $('sound-icon-off').style.display = state.soundEnabled ? 'none' : 'block';
        }

        // Boot
        document.addEventListener('DOMContentLoaded', init);
    })();
    </script>
</body>
</html>
