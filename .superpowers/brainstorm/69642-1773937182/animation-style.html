<h2>3D 抽籤動畫風格</h2>
<p class="subtitle">你希望抽籤時的視覺效果是哪種風格？</p>

<div class="options">
  <div class="option" data-choice="cylinder" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>轉輪式</h3>
      <p>圓柱體旋轉，名字貼在圓柱表面，像老虎機一樣滾動後停下</p>
    </div>
  </div>
  <div class="option" data-choice="sphere" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>球體式</h3>
      <p>名字漂浮在 3D 球體空間中旋轉，抽中者飛出放大顯示</p>
    </div>
  </div>
  <div class="option" data-choice="cards" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>卡牌式</h3>
      <p>3D 卡牌翻轉洗牌效果，最後翻開一張顯示中獎者</p>
    </div>
  </div>
  <div class="option" data-choice="slots" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>老虎機式</h3>
      <p>經典三軸老虎機滾動，名字快速滾動後依序停下</p>
    </div>
  </div>
</div>
