<h2>名單和獎項的輸入方式</h2>
<p class="subtitle">使用者要怎麼輸入名單和獎項？</p>

<div class="options">
  <div class="option" data-choice="textarea" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>文字輸入框</h3>
      <p>用文字框輸入，一行一個名字/獎項，簡單直接</p>
    </div>
  </div>
  <div class="option" data-choice="ui-list" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>列表管理介面</h3>
      <p>有新增/刪除/編輯按鈕的列表介面，可拖曳排序</p>
    </div>
  </div>
  <div class="option" data-choice="json" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>JSON 編輯器</h3>
      <p>直接編輯 JSON 格式，適合進階使用者</p>
    </div>
  </div>
</div>
