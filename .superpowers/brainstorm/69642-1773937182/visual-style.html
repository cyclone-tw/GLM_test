<h2>整體視覺風格</h2>
<p class="subtitle">你希望介面的整體風格是什麼感覺？</p>

<div class="options">
  <div class="option" data-choice="tech" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>科技感</h3>
      <p>深色背景、霓虹光效、粒子特效，像科幻電影</p>
    </div>
  </div>
  <div class="option" data-choice="festive" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>節慶派對</h3>
      <p>彩色繽紛、金幣彩帶、慶祝動畫，熱鬧歡樂</p>
    </div>
  </div>
  <div class="option" data-choice="minimal" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>簡約現代</h3>
      <p>乾淨的白色/淺色背景、扁平設計、專業感</p>
    </div>
  </div>
  <div class="option" data-choice="custom" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>可自訂主題</h3>
      <p>提供多種主題切換，使用者可以選擇喜歡的風格</p>
    </div>
  </div>
</div>
